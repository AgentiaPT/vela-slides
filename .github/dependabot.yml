version: 2
updates:
  # npm devDependencies (jsdom, react, react-dom, @babel/standalone,
  # lucide-react, playwright). All are dev-only — none ship to users —
  # but we lock them in CI via `npm ci`, so a silent caret drift can't
  # happen and we want patch-level advisories surfaced as PRs.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Supply-chain "cooldown": don't open a PR until a release has been public
    # for N days, so a compromised/yanked version is caught upstream before it
    # ever reaches us. Larger jumps wait longer. Security (CVE) updates are
    # exempt and still open immediately.
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  # GitHub Actions are pinned by full commit SHA in our workflows;
  # Dependabot understands SHA-pinned uses and keeps the trailing
  # `# vN` comment in sync.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Same supply-chain cooldown for Actions: wait out the window in which a
    # poisoned tag/release is typically detected and pulled. Security updates
    # are exempt.
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "github-actions"
