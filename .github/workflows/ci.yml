name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  version-bump-check:
    name: Version Bump Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check VELA_VERSION bump for skill file changes
        id: version_check
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          IMPORTS_FILE="skills/vela-slides/app/parts/part-imports.jsx"

          # Check if any skill files changed
          SKILL_CHANGES=$(git diff --name-only "$BASE_SHA"...HEAD -- 'skills/vela-slides/' || true)

          if [ -z "$SKILL_CHANGES" ]; then
            echo "✅ No skill files changed — version bump not required."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Skill files changed:"
          echo "$SKILL_CHANGES"
          echo ""

          # Extract VELA_VERSION from PR branch
          PR_VERSION=$(grep -oP 'const VELA_VERSION\s*=\s*"\K[^"]+' "$IMPORTS_FILE")

          # Extract VELA_VERSION from base branch (file may not exist if this is a new addition)
          if git show "$BASE_SHA":"$IMPORTS_FILE" > /dev/null 2>&1; then
            BASE_VERSION=$(git show "$BASE_SHA":"$IMPORTS_FILE" | grep -oP 'const VELA_VERSION\s*=\s*"\K[^"]+')
          else
            BASE_VERSION=""
          fi

          echo "Base version: ${BASE_VERSION:-<new file>}"
          echo "PR version:   $PR_VERSION"
          echo ""

          if [ -z "$BASE_VERSION" ]; then
            echo "✅ part-imports.jsx is new — version bump not required for initial addition."
            exit 0
          fi

          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "❌ Files under skills/vela-slides/ changed but VELA_VERSION was not bumped."
            echo "   Current: $PR_VERSION (same as base branch)"
            echo "   Update VELA_VERSION in part-imports.jsx and add a VELA_CHANGELOG entry."
            exit 1
          fi

          echo "✅ Version bumped from $BASE_VERSION → $PR_VERSION."

  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install jsdom for sanitizer round-trip tests
        # Unit tests include tests/test_svg_mxss.cjs which loads the real
        # sanitizer source under jsdom and asserts no live event handler
        # materializes for any of the SVG mXSS payloads. Must be installed
        # BEFORE the unit step (e2e deps install runs much later). Pinned
        # to the same version recorded in package.json devDependencies so
        # dev + CI behave identically.
        run: npm install jsdom@^29.1.1

      - name: Run unit tests
        id: unit
        run: |
          set +e
          start_time=$(date +%s)
          output=$(python3 tests/test_vela.py --unit 2>&1)
          exit_code=$?
          elapsed=$(( $(date +%s) - start_time ))
          echo "$output"
          # Parse test counts from summary line: "✅ N passed  ❌ M failed"
          passed=$(echo "$output" | grep -oP '✅\s+\K\d+(?=\s+passed)' | tail -1)
          failed=$(echo "$output" | grep -oP '❌\s+\K\d+(?=\s+failed)' | tail -1)
          passed=${passed:-0}
          failed=${failed:-0}
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "output<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "failed=$failed" >> $GITHUB_OUTPUT
          echo "elapsed=${elapsed}s" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Run integration tests
        id: integration
        if: always()
        run: |
          set +e
          start_time=$(date +%s)
          output=$(python3 tests/test_vela.py --integration 2>&1)
          exit_code=$?
          elapsed=$(( $(date +%s) - start_time ))
          echo "$output"
          passed=$(echo "$output" | grep -oP '✅\s+\K\d+(?=\s+passed)' | tail -1)
          failed=$(echo "$output" | grep -oP '❌\s+\K\d+(?=\s+failed)' | tail -1)
          passed=${passed:-0}
          failed=${failed:-0}
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "output<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "failed=$failed" >> $GITHUB_OUTPUT
          echo "elapsed=${elapsed}s" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Run server tests
        id: server
        if: always()
        run: |
          set +e
          start_time=$(date +%s)
          output=$(python3 -m unittest tests.test_serve -v 2>&1)
          exit_code=$?
          elapsed=$(( $(date +%s) - start_time ))
          echo "$output"
          passed=$(echo "$output" | grep -cE '^\S+ .* ok$')
          failed=$(echo "$output" | grep -cE '^\S+ .* FAIL$')
          passed=${passed:-0}
          failed=${failed:-0}
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "output<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "failed=$failed" >> $GITHUB_OUTPUT
          echo "elapsed=${elapsed}s" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Verify concat produces identical template
        id: concat
        if: always()
        run: |
          set +e
          start_time=$(date +%s)
          cp skills/vela-slides/app/vela.jsx /tmp/original.jsx
          output=$(python3 skills/vela-slides/scripts/concat.py skills/vela-slides/app/parts skills/vela-slides/app/vela.jsx 2>&1)
          diff_output=$(diff /tmp/original.jsx skills/vela-slides/app/vela.jsx 2>&1)
          if [ -n "$diff_output" ]; then
            exit_code=1
            output="❌ vela.jsx is out of sync with parts!
          Run: python3 skills/vela-slides/scripts/concat.py
          Then commit the updated template.

          Diff:
          $diff_output"
          else
            exit_code=0
            output="✅ Template in sync with parts"
          fi
          elapsed=$(( $(date +%s) - start_time ))
          echo "$output"
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "output<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          echo "elapsed=${elapsed}s" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Install e2e dependencies
        if: always()
        run: |
          npm install react@18.3.1 react-dom@18.3.1 @babel/standalone@7.26.10 lucide-react@0.344.0 playwright@1.55.1
          npx playwright install --with-deps chromium

      - name: Run e2e UI tests
        id: e2e
        if: always()
        run: |
          set +e
          start_time=$(date +%s)
          output=$(node tests/test_review_ui.cjs 2>&1)
          exit_code=$?
          elapsed=$(( $(date +%s) - start_time ))
          echo "$output"
          passed=$(echo "$output" | grep -oP '✅\s+\K\d+(?=\s+passed)' | tail -1)
          failed=$(echo "$output" | grep -oP '\d+(?=\s+failed)' | tail -1)
          passed=${passed:-0}
          failed=${failed:-0}
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "output<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "failed=$failed" >> $GITHUB_OUTPUT
          echo "elapsed=${elapsed}s" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Post test status comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        # SECURITY: test stdout is attacker-controlled (a PR can introduce a
        # fixture whose name contains backticks or ${...}). Interpolating
        # step outputs via ${{ }} inlines them into the JS source before the
        # script runs — a single backtick in test output breaks out of the
        # template literal and executes arbitrary JS with the workflow's
        # GITHUB_TOKEN. Pass everything via env: + process.env instead.
        env:
          UNIT_EXIT: ${{ steps.unit.outputs.exit_code }}
          INT_EXIT: ${{ steps.integration.outputs.exit_code }}
          SRV_EXIT: ${{ steps.server.outputs.exit_code }}
          CONCAT_EXIT: ${{ steps.concat.outputs.exit_code }}
          E2E_EXIT: ${{ steps.e2e.outputs.exit_code }}
          UNIT_OUTPUT: ${{ steps.unit.outputs.output }}
          INT_OUTPUT: ${{ steps.integration.outputs.output }}
          SRV_OUTPUT: ${{ steps.server.outputs.output }}
          CONCAT_OUTPUT: ${{ steps.concat.outputs.output }}
          E2E_OUTPUT: ${{ steps.e2e.outputs.output }}
          UNIT_PASSED: ${{ steps.unit.outputs.passed }}
          UNIT_FAILED: ${{ steps.unit.outputs.failed }}
          UNIT_TIME: ${{ steps.unit.outputs.elapsed }}
          INT_PASSED: ${{ steps.integration.outputs.passed }}
          INT_FAILED: ${{ steps.integration.outputs.failed }}
          INT_TIME: ${{ steps.integration.outputs.elapsed }}
          SRV_PASSED: ${{ steps.server.outputs.passed }}
          SRV_FAILED: ${{ steps.server.outputs.failed }}
          SRV_TIME: ${{ steps.server.outputs.elapsed }}
          CONCAT_TIME: ${{ steps.concat.outputs.elapsed }}
          E2E_PASSED: ${{ steps.e2e.outputs.passed }}
          E2E_FAILED: ${{ steps.e2e.outputs.failed }}
          E2E_TIME: ${{ steps.e2e.outputs.elapsed }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const unitExit = process.env.UNIT_EXIT || '';
            const integrationExit = process.env.INT_EXIT || '';
            const serverExit = process.env.SRV_EXIT || '';
            const concatExit = process.env.CONCAT_EXIT || '';
            const e2eExit = process.env.E2E_EXIT || '';

            const unitOutput = process.env.UNIT_OUTPUT || '';
            const integrationOutput = process.env.INT_OUTPUT || '';
            const serverOutput = process.env.SRV_OUTPUT || '';
            const concatOutput = process.env.CONCAT_OUTPUT || '';
            const e2eOutput = process.env.E2E_OUTPUT || '';

            const unitPassed = process.env.UNIT_PASSED || '0';
            const unitFailed = process.env.UNIT_FAILED || '0';
            const unitTime = process.env.UNIT_TIME || '?';
            const intPassed = process.env.INT_PASSED || '0';
            const intFailed = process.env.INT_FAILED || '0';
            const intTime = process.env.INT_TIME || '?';
            const srvPassed = process.env.SRV_PASSED || '0';
            const srvFailed = process.env.SRV_FAILED || '0';
            const srvTime = process.env.SRV_TIME || '?';
            const concatTime = process.env.CONCAT_TIME || '?';
            const e2ePassed = process.env.E2E_PASSED || '0';
            const e2eFailed = process.env.E2E_FAILED || '0';
            const e2eTime = process.env.E2E_TIME || '?';

            const sha = (process.env.HEAD_SHA || '').slice(0, 7);
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const status = (code) => code === '0' ? '✅ Passed' : '❌ Failed';
            const overall = (unitExit === '0' && integrationExit === '0' && serverExit === '0' && concatExit === '0' && e2eExit === '0') ? '✅ All checks passed' : '❌ Some checks failed';

            const totalPassed = parseInt(unitPassed) + parseInt(intPassed) + parseInt(srvPassed) + parseInt(e2ePassed);
            const totalFailed = parseInt(unitFailed) + parseInt(intFailed) + parseInt(srvFailed) + parseInt(e2eFailed);
            const totalTests = totalPassed + totalFailed;

            const timestamp = new Date().toISOString().replace('T', ' ').replace(/\.\d+Z$/, ' UTC');

            let body = `## 🧪 CI Test Results — Python 3.12 + Node 22\n\n`;
            body += `**Overall: ${overall}** — ${totalPassed}/${totalTests} tests passed`;
            if (totalFailed > 0) body += `, ${totalFailed} failed`;
            body += `\n\n`;
            body += `| Check | Status | Tests | Time |\n|-------|--------|-------|------|\n`;
            body += `| Unit Tests | ${status(unitExit)} | ${unitPassed} passed${unitFailed !== '0' ? ', ' + unitFailed + ' failed' : ''} | ${unitTime} |\n`;
            body += `| Integration Tests | ${status(integrationExit)} | ${intPassed} passed${intFailed !== '0' ? ', ' + intFailed + ' failed' : ''} | ${intTime} |\n`;
            body += `| Server Tests | ${status(serverExit)} | ${srvPassed} passed${srvFailed !== '0' ? ', ' + srvFailed + ' failed' : ''} | ${srvTime} |\n`;
            body += `| E2E UI Tests | ${status(e2eExit)} | ${e2ePassed} passed${e2eFailed !== '0' ? ', ' + e2eFailed + ' failed' : ''} | ${e2eTime} |\n`;
            body += `| Template Sync | ${status(concatExit)} | — | ${concatTime} |\n\n`;

            // Add error details for failed steps
            const failures = [];
            if (unitExit !== '0') failures.push({ name: 'Unit Tests', output: unitOutput });
            if (integrationExit !== '0') failures.push({ name: 'Integration Tests', output: integrationOutput });
            if (serverExit !== '0') failures.push({ name: 'Server Tests', output: serverOutput });
            if (e2eExit !== '0') failures.push({ name: 'E2E UI Tests', output: e2eOutput });
            if (concatExit !== '0') failures.push({ name: 'Template Sync', output: concatOutput });

            if (failures.length > 0) {
              body += `### Error Details\n\n`;
              for (const f of failures) {
                body += `<details>\n<summary>${f.name}</summary>\n\n\`\`\`\n${f.output}\n\`\`\`\n\n</details>\n\n`;
              }
            }

            body += `---\n`;
            body += `📌 Commit: \`${sha}\` | [View Run](${runUrl})\n`;
            body += `🕐 Updated: ${timestamp}\n`;
            body += `\n<!-- vela-ci-status -->`;

            const marker = `<!-- vela-ci-status -->`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
