name: Release

on:
  push:
    branches: [main]
    paths:
      - 'skills/vela-slides/**'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    # Only run after CI passes (same commit)
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run full test suite
        run: python3 tests/test_vela.py

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "
          import re
          content = open('skills/vela-slides/app/parts/part-imports.jsx').read()
          m = re.search(r'const VELA_VERSION\s*=\s*\"([^\"]+)\"', content)
          print(m.group(1) if m else 'unknown')
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.version.outputs.tag }} does not exist — will create."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog entry
        if: steps.check_release.outputs.exists == 'false'
        id: changelog
        run: |
          NOTES=$(python3 -c "
          import re, json
          content = open('skills/vela-slides/app/parts/part-imports.jsx').read()
          m = re.search(r'const VELA_CHANGELOG\s*=\s*\[([^\]]+)\]', content, re.DOTALL)
          if m:
              # Extract first entry's description
              entry = re.search(r'd:\s*\"([^\"]+)\"', m.group(1))
              if entry:
                  print(entry.group(1))
              else:
                  print('New release')
          else:
              print('New release')
          ")
          # Write multiline-safe output
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build skill ZIP
        if: steps.check_release.outputs.exists == 'false'
        run: |
          # Rebuild template from parts (ensure clean build)
          python3 skills/vela-slides/scripts/concat.py skills/vela-slides/app/parts skills/vela-slides/app/vela.jsx

          # Create the installable skill ZIP
          cd skills
          zip -r ../vela-slides-skill-${{ steps.version.outputs.tag }}.zip vela-slides/
          cd ..

          echo "Built: vela-slides-skill-${{ steps.version.outputs.tag }}.zip"
          ls -lh vela-slides-skill-*.zip

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            vela-slides-skill-${{ steps.version.outputs.tag }}.zip \
            --title "Vela Slides ${{ steps.version.outputs.tag }}" \
            --notes "## Vela Slides ${{ steps.version.outputs.version }}

          ${{ steps.changelog.outputs.notes }}

          ### Installation

          1. Download \`vela-slides-skill-${{ steps.version.outputs.tag }}.zip\` below
          2. In Claude.ai → **Customize → Skills** → **\"+\"** → **Upload a skill**
          3. Upload the ZIP — done!

          For Claude Code:
          \`\`\`bash
          unzip vela-slides-skill-${{ steps.version.outputs.tag }}.zip -d ~/.claude/skills/
          \`\`\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
