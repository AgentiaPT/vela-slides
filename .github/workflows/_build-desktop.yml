name: Build Desktop (reusable)

# Reusable workflow that builds unsigned per-OS Neutralino desktop binaries
# and uploads them as an artifact. Called from both release.yml (push to main)
# and release-preview.yml (PR preview). Centralising the build keeps the
# stable release and the preview release bit-for-bit equivalent.

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref or SHA to check out (a SHA pins safely against branch movement).'
        required: true
        type: string
      tag:
        description: 'Tag to embed in ZIP filenames, e.g. v10.5 or v10.5-rc.pr42.'
        required: true
        type: string
      artifact_name:
        description: 'Name of the uploaded artifact bundle.'
        required: false
        type: string
        default: desktop-zips

permissions:
  contents: read

jobs:
  build:
    name: Build desktop (unsigned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9

      - name: Install neu CLI
        # --ignore-workspace: repo root has a pnpm-workspace.yaml we must not
        # pull in. --ignore-scripts: policy (see CLAUDE.md). --no-frozen-lockfile:
        # vela-neutralino has no checked-in lockfile, so frozen would fail.
        # @neutralinojs/neu is exact-pinned in vela-neutralino/package.json.
        working-directory: vela-neutralino
        run: pnpm install --ignore-workspace --ignore-scripts --no-frozen-lockfile

      - name: Regenerate monolith
        run: python3 skills/vela-slides/scripts/concat.py

      - name: Preprocess vela.jsx for Neutralino
        run: python3 vela-neutralino/scripts/sync-vela.py

      - name: Fetch Neutralino runtime binaries
        working-directory: vela-neutralino
        run: ./node_modules/.bin/neu update

      - name: Verify runtime against pinned checksums
        # Fails the build if `neu update` fetched anything that does not match
        # vela-neutralino/checksums/runtime-v<binaryVersion>.sha256 +
        # clientlib-v<clientVersion>.sha256. Catches upstream re-rolls and
        # tampered downloads before we ship binaries to users.
        run: python3 vela-neutralino/scripts/verify-runtime.py

      - name: Build desktop bundles
        # --embed-resources injects resources.neu into each per-OS binary via
        # the postject library, producing a true single-file executable per
        # platform (no companion resources.neu needed). Requires neu CLI ≥
        # 11.6.0 and framework ≥ 6.3.0 — both pinned in vela-neutralino/.
        # If we ever add code-signing, sign AFTER this step: postject mutates
        # the binary, so a signature applied to the un-embedded build would
        # be invalidated.
        working-directory: vela-neutralino
        run: ./node_modules/.bin/neu build --release --embed-resources

      - name: Build agent gatekeeper (test + cross-compile)
        # Node-free hardened gatekeeper — the only process allowed to spawn the
        # whitelisted agent CLIs (see vela-neutralino/SECURITY.md). Uses the Go
        # toolchain preinstalled on ubuntu-latest (mirrors the golang:1.22 stage
        # in vela-neutralino/Dockerfile). Unit tests gate the build.
        working-directory: vela-neutralino/extensions/agent
        run: |
          set -euo pipefail
          go version
          go test ./...
          for t in "linux amd64 linux_x64 vela-agent" \
                   "linux arm64 linux_arm64 vela-agent" \
                   "darwin amd64 mac_x64 vela-agent" \
                   "darwin arm64 mac_arm64 vela-agent" \
                   "windows amd64 win_x64 vela-agent.exe"; do
            set -- $t
            mkdir -p "$GITHUB_WORKSPACE/gatekeepers/$3"
            CGO_ENABLED=0 GOOS="$1" GOARCH="$2" go build -trimpath -ldflags="-s -w" \
              -o "$GITHUB_WORKSPACE/gatekeepers/$3/$4" .
          done
          # mac_universal: Apple-Silicon binary (Intel-mac users use mac_x64).
          mkdir -p "$GITHUB_WORKSPACE/gatekeepers/mac_universal"
          cp "$GITHUB_WORKSPACE/gatekeepers/mac_arm64/vela-agent" \
             "$GITHUB_WORKSPACE/gatekeepers/mac_universal/vela-agent"

      - name: Package per-OS ZIPs
        working-directory: vela-neutralino/dist/vela
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          # Single-file binary — resources.neu is now embedded by postject. Each
          # ZIP carries the platform binary at the root plus the arch-matched
          # gatekeeper at extensions/agent/ (resolved at runtime via
          # ${NL_PATH}/extensions/agent/vela-agent[.exe]).
          package() {
            local os="$1"; local bin="$2"; local gk="$3"; shift 3
            local stage; stage="$(mktemp -d)"
            mkdir -p "$stage/extensions/agent"
            cp "$bin" "$stage/$bin"
            cp "$GITHUB_WORKSPACE/gatekeepers/$os/$gk" "$stage/extensions/agent/$gk"
            for extra in "$@"; do cp "$extra" "$stage/$extra"; done
            local zip="$GITHUB_WORKSPACE/vela-neutralino/vela-desktop-${TAG}-${os}.zip"
            ( cd "$stage" && zip -r "$zip" . )
            echo "  → $(basename "$zip")"
          }
          package linux_x64      vela-linux_x64     vela-agent
          package linux_arm64    vela-linux_arm64   vela-agent
          package mac_x64        vela-mac_x64       vela-agent
          package mac_arm64      vela-mac_arm64     vela-agent
          package mac_universal  vela-mac_universal vela-agent
          # Neutralino 6.x links against the system-installed WebView2
          # runtime (shipped in Windows 10 1809+ / Windows 11), so we no
          # longer need to bundle WebView2Loader.dll alongside the exe.
          # If a future pin regresses this, fail loudly.
          if [ -f WebView2Loader.dll ]; then
            package win_x64      vela-win_x64.exe   vela-agent.exe WebView2Loader.dll
          else
            package win_x64      vela-win_x64.exe   vela-agent.exe
          fi
          ls -lh "$GITHUB_WORKSPACE"/vela-neutralino/vela-desktop-*.zip

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: vela-neutralino/vela-desktop-*.zip
          if-no-files-found: error
          retention-days: 14
