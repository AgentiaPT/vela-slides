# Vela Desktop — Build & Test CI
# Triggers on PRs and pushes that touch vela-desktop/ files

name: Desktop Build

on:
  push:
    branches: ['desktop/*']
    tags: ['desktop-v*']
    paths:
      - 'vela-desktop/**'
  pull_request:
    paths:
      - 'vela-desktop/**'

permissions:
  contents: read

jobs:
  # ── Rust tests ────────────────────────────────────────────────────
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vela-desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vela-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('vela-desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Create dist placeholder
        run: mkdir -p ../dist && echo "<html></html>" > ../dist/index.html

      - name: Run Rust tests
        run: cargo test --verbose

      - name: Check formatting
        run: cargo fmt -- --check
        continue-on-error: true

      - name: Run clippy
        run: cargo clippy -- -W clippy::all
        continue-on-error: true

  # ── Frontend build ────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vela-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Rebuild vela.jsx monolith
        run: python3 ../skills/vela-slides/scripts/concat.py

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npx vite build

      - name: Verify output
        run: |
          test -f dist/index.html
          echo "Frontend build size:"
          du -sh dist/

  # ── Tauri build (all platforms) ──────────────────────────────────
  build-tauri:
    name: Tauri Build (${{ matrix.label }})
    needs: [test-rust, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            label: Linux
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            label: macOS
            target: aarch64-apple-darwin
          - platform: windows-latest
            label: Windows
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: vela-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vela-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('vela-desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Rebuild vela.jsx monolith
        run: python3 ../skills/vela-slides/scripts/concat.py

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vela-desktop-linux
          path: |
            vela-desktop/src-tauri/target/release/bundle/deb/*.deb
            vela-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vela-desktop-macos
          path: |
            vela-desktop/src-tauri/target/release/bundle/dmg/*.dmg
            vela-desktop/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vela-desktop-windows
          path: |
            vela-desktop/src-tauri/target/release/bundle/nsis/*.exe
            vela-desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
