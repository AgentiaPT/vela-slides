name: Release Preview

# Builds a preview release from a PR branch: skill ZIP + desktop binaries (3 platforms).
# Triggered by the release-preview-trigger.yml workflow (via /release-preview comment).
# Can also be triggered manually from the Actions tab.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number'
        required: true
        type: string
      pr_sha:
        description: 'PR head SHA (pinned for safety)'
        required: true
        type: string
      pr_ref:
        description: 'PR head branch'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Skill ZIP + metadata ───────────────────────────────────────────
  build-skill:
    name: Build Skill ZIP
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      notes: ${{ steps.changelog.outputs.notes }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_sha }}

      - name: Verify SHA matches branch tip
        run: |
          git fetch origin "${{ inputs.pr_ref }}" --depth=1
          BRANCH_TIP=$(git rev-parse FETCH_HEAD)
          if [ "$BRANCH_TIP" != "${{ inputs.pr_sha }}" ]; then
            echo "⚠️  Branch has moved since dispatch. Expected ${{ inputs.pr_sha }}, got $BRANCH_TIP."
            echo "Building pinned SHA anyway for safety."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python3 tests/test_vela.py

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "
          import re
          content = open('skills/vela-slides/app/parts/part-imports.jsx').read()
          m = re.search(r'const VELA_VERSION\s*=\s*\"([^\"]+)\"', content)
          print(m.group(1) if m else 'unknown')
          ")
          TAG="v${VERSION}-rc.pr${{ inputs.pr_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION → Tag: $TAG"

      - name: Extract changelog
        id: changelog
        run: |
          NOTES=$(python3 -c "
          import re
          content = open('skills/vela-slides/app/parts/part-imports.jsx').read()
          m = re.search(r'const VELA_CHANGELOG\s*=\s*\[([^\]]+)\]', content, re.DOTALL)
          if m:
              entry = re.search(r'd:\s*\"([^\"]+)\"', m.group(1))
              print(entry.group(1) if entry else 'Preview release')
          else:
              print('Preview release')
          ")
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build skill ZIP
        run: |
          python3 skills/vela-slides/scripts/concat.py skills/vela-slides/app/parts skills/vela-slides/app/vela.jsx
          cd skills
          zip -r ../vela-slides-skill-${{ steps.version.outputs.tag }}.zip vela-slides/
          cd ..
          echo "Built: vela-slides-skill-${{ steps.version.outputs.tag }}.zip"
          ls -lh vela-slides-skill-*.zip

      - name: Upload skill ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: skill-zip
          path: vela-slides-skill-*.zip

  # ── Desktop binaries (3 platforms) ─────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            label: Linux
            artifact-name: vela-desktop-linux
          - platform: macos-latest
            label: macOS
            artifact-name: vela-desktop-macos
          - platform: windows-latest
            label: Windows
            artifact-name: vela-desktop-windows
    defaults:
      run:
        working-directory: vela-desktop

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_sha }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vela-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-preview-${{ hashFiles('vela-desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-preview-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Rebuild vela.jsx monolith
        run: python3 ../skills/vela-slides/scripts/concat.py

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        # Signing disabled for preview builds — production releases should use proper code signing
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            vela-desktop/src-tauri/target/release/bundle/deb/*.deb
            vela-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            vela-desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            vela-desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ── Publish preview release ────────────────────────────────────────
  publish:
    name: Publish Preview Release
    needs: [build-skill, build-desktop]
    runs-on: ubuntu-latest
    # Run even if some desktop builds fail (skill ZIP is always available)
    if: always() && needs.build-skill.result == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List collected assets
        run: find release-assets -type f | head -50

      - name: Flatten assets into single directory
        run: |
          mkdir -p flat-assets
          # Skill ZIP
          cp release-assets/skill-zip/*.zip flat-assets/ 2>/dev/null || true
          # Desktop binaries (warn if missing — build may have failed for a platform)
          find release-assets/vela-desktop-linux -type f \( -name "*.deb" -o -name "*.AppImage" \) -exec cp {} flat-assets/ \; 2>/dev/null || echo "⚠️  No Linux desktop artifacts found"
          find release-assets/vela-desktop-macos -type f -name "*.dmg" -exec cp {} flat-assets/ \; 2>/dev/null || echo "⚠️  No macOS desktop artifacts found"
          find release-assets/vela-desktop-windows -type f -name "*.exe" -exec cp {} flat-assets/ \; 2>/dev/null || echo "⚠️  No Windows desktop artifacts found"
          echo "Release assets:"
          ls -lh flat-assets/

      - name: Delete existing preview release
        run: |
          gh release delete "${{ needs.build-skill.outputs.tag }}" --yes 2>/dev/null || true
          git push --delete origin "refs/tags/${{ needs.build-skill.outputs.tag }}" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create preview release
        run: |
          gh release create "${{ needs.build-skill.outputs.tag }}" \
            flat-assets/* \
            --title "Vela Slides ${{ needs.build-skill.outputs.version }} (Preview PR #${{ inputs.pr_number }})" \
            --notes "## Preview Release — PR #${{ inputs.pr_number }}

          > **This is a pre-release for testing.** The official release will be created when the PR is merged to main.

          ${{ needs.build-skill.outputs.notes }}

          ### Skill (Claude.ai)

          1. Download \`vela-slides-skill-${{ needs.build-skill.outputs.tag }}.zip\` below
          2. In Claude.ai → **Customize → Skills** → **\"+\"** → **Upload a skill**
          3. Upload the ZIP — done!

          ### Desktop App

          | Platform | Download |
          |----------|----------|
          | macOS    | \`.dmg\` installer |
          | Windows  | \`.exe\` installer (NSIS) |
          | Linux    | \`.AppImage\` or \`.deb\` |

          ---
          📌 Branch: \`${{ inputs.pr_ref }}\` · Commit: \`${{ inputs.pr_sha }}\`" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.build-skill.outputs.tag }}';
            const version = '${{ needs.build-skill.outputs.version }}';
            const sha = '${{ inputs.pr_sha }}'.slice(0, 7);
            const releaseUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ inputs.pr_number }}'),
              body: `## ⛵ Preview Release Ready\n\n**Vela Slides v${version}** — [\`${tag}\`](${releaseUrl})\n\n📦 [Download all assets](${releaseUrl}) · 📌 Commit: \`${sha}\`\n\n**Skill ZIP** — Install in Claude.ai: Customize → Skills → + → Upload a skill\n\n**Desktop App** — macOS (.dmg) · Windows (.exe) · Linux (.AppImage / .deb)\n\n<!-- vela-preview-release -->`,
            });
